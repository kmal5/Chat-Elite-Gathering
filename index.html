<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Gathering Empire</title>
    <style>
        :root { --gold: #ffa000; --royal: #1a237e; --danger: #f44336; --dark: #0a0a0a; }
        body { background: var(--dark); color: #eee; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* القائمة الجانبية للغرف */
        .sidebar { width: 100px; background: #111; border-left: 1px solid var(--gold); display: flex; flex-direction: column; padding: 10px; gap: 8px; overflow-y: auto; }
        .room-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .room-btn:hover, .room-btn.active { border-color: var(--gold); color: var(--gold); background: #1a1a00; }

        /* منطقة الدردشة الرئيسية */
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .royal-header { background: linear-gradient(to left, #1a1a1a, #000); padding: 12px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; background: #000; scroll-behavior: smooth; }
        
        /* الرسائل والرتب */
        .msg-card { background: #1e1e1e; margin-bottom: 12px; padding: 12px; border-radius: 8px; border-right: 4px solid var(--gold); position: relative; animation: fadeIn 0.3s; }
        .rank-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 5px; font-weight: bold; vertical-align: middle; }
        .rank-owner { background: var(--gold); color: #000; }
        .rank-admin { background: #2196f3; color: #fff; }
        .rank-premium { background: #9c27b0; color: #fff; }
        
        /* أدوات الإدارة (تظهر للأونر والأدمن) */
        .admin-tools { display: flex; gap: 5px; margin-top: 8px; border-top: 1px solid #333; padding-top: 5px; }
        .tool-btn { font-size: 9px; padding: 2px 6px; border-radius: 3px; cursor: pointer; border: none; font-weight: bold; }
        .btn-mute { background: #ff9800; color: #000; }
        .btn-kick { background: var(--danger); color: #fff; }
        .btn-warn { background: #ffeb3b; color: #000; }

        /* منطقة الإدخال */
        .input-area { background: #1a1a1a; padding: 12px; display: flex; gap: 10px; border-top: 1px solid var(--gold); }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; }
        .send-btn { background: var(--gold); border: none; width: 45px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        /* لوحة الإعدادات */
        .settings-panel { position: absolute; left: 10px; top: 55px; background: #222; padding: 15px; border: 1px solid var(--gold); border-radius: 10px; display: none; z-index: 1000; width: 200px; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="color:var(--gold); font-weight:bold; margin-bottom:5px; font-size:11px; text-align:center;">🌍 الغرف</div>
    <div class="room-btn active">🏰 العرش</div>
    <div class="room-btn">🇩🇿 الجزائر</div>
    <div class="room-btn">🇹🇳 تونس</div>
    <div class="room-btn">🇴🇲 عمان</div>
    <div class="room-btn">🇮🇶 العراق</div>
    <div class="room-btn">🇱🇾 ليبيا</div>
    <div class="room-btn">🇪🇬 مصر</div>
</div>

<div class="main-chat">
    <div class="royal-header">
        <div style="color:var(--gold); font-weight:bold; font-size:16px;">👑 Elite Gathering</div>
        <div style="display:flex; gap:12px; align-items:center;">
            <span style="color:#f06292; cursor:pointer; font-size:14px;" onclick="toggleSettings()">⚙️ حسابي</span>
            <span style="color:#4fc3f7; font-weight:bold;">💎 1,500</span>
        </div>
    </div>

    <div id="chatBox">
        <div class="msg-card">
            <div><span class="rank-badge rank-owner">سلطان</span><span style="color:#4fc3f7; font-weight:bold;">فيصل</span></div>
            <div style="margin-top:5px; color:#fff;">مرحباً بكم في إمبراطورية Elite Gathering.. القوانين واضحة والاحترام أساسنا.</div>
            <div class="admin-tools">
                <button class="tool-btn btn-warn">تحذير</button>
                <button class="tool-btn btn-mute">كتم خاص</button>
                <button class="tool-btn btn-kick">طرد</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="تحدث مع الملوك...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <h4 style="margin-top:0; color:var(--gold); border-bottom:1px solid #444; padding-bottom:5px;">إعدادات العرش</h4>
    <input type="text" placeholder="تغيير اسمك" style="width:100%; margin-bottom:10px; background:#111; border:1px solid #444; color:#fff; padding:5px; box-sizing:border-box;"><br>
    <input type="text" placeholder="رابط الصورة الشخصية" style="width:100%; margin-bottom:10px; background:#111; border:1px solid #444; color:#fff; padding:5px; box-sizing:border-box;"><br>
    <label style="font-size:10px;"><input type="checkbox"> إخفاء أصدقائي</label><br>
    <label style="font-size:10px;"><input type="checkbox"> إخفاء معلوماتي</label><br>
    <button onclick="toggleSettings()" style="margin-top:10px; width:100%; background:var(--gold); border:none; padding:8px; border-radius:5px; font-weight:bold; cursor:pointer;">حفظ التغييرات</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5ZOLVpiyBZsfNp9qhkPt0ST5KcFlIwuo",
    authDomain: "chat-elite-gathering.firebaseapp.com",
    projectId: "chat-elite-gathering",
    storageBucket: "chat-elite-gathering.firebasestorage.app",
    messagingSenderId: "555680069709",
    appId: "1:555680069709:web:8dd330d860eef9a157c404"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "messages");

  // فتح وإغلاق الإعدادات
  window.toggleSettings = function() {
    const p = document.getElementById('settingsPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
  };

  // إرسال الرسالة برتبة أونر (مؤقتاً للجميع لغرض العرض)
  document.getElementById('sendBtn').onclick = async () => {
    const input = document.getElementById('msgInput');
    if(input.value.trim() !== "") {
      await addDoc(colRef, {
        sender: "فيصل",
        rank: "سلطان",
        content: input.value,
        timestamp: serverTimestamp()
      });
      input.value = "";
    }
  };

  const q = query(colRef, orderBy("timestamp", "asc"));
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById('chatBox');
    container.innerHTML = ""; // إعادة التحميل لضمان الترتيب
    snapshot.forEach((doc) => {
      const data = doc.data();
      const div = document.createElement('div');
      div.className = 'msg-card';
      // تمييز رتبة الأونر في الكود
      const rankClass = data.rank === "سلطان" ? "rank-owner" : "rank-admin";
      div.innerHTML = `
        <div><span class="rank-badge ${rankClass}">${data.rank || 'عضو'}</span><span style="color:#4fc3f7; font-weight:bold;">${data.sender}</span></div>
        <div style="margin-top:5px; color:#fff;">${data.content}</div>
        <div class="admin-tools">
            <button class="tool-btn btn-warn">تحذير</button>
            <button class="tool-btn btn-kick">طرد</button>
        </div>
      `;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });
</script>

</body>
</html>

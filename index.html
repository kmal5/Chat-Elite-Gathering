        .room { width: 50px; height: 50px; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; cursor: pointer; }

        /* منطقة الرسايل بالرتب */
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { background: #121212; border-radius: 10px; padding: 10px; border-right: 4px solid var(--gold); max-width: 90%; }
        .msg-info { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .name { font-weight: bold; font-size: 14px; }
        .rank { background: var(--royal); font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .text { color: #ccc; font-size: 15px; }

        .send-btn { background: var(--gold); color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 18px; }
    </style>
</head>

    <div class="sidebar">
        <div class="room active" onclick="alert('أنت في غرفة الجزائر')">🇩🇿</div>

        </div>

        <div class="footer">
            <input type="text" id="inp" placeholder="اكتب رسالتك هنا...">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script>
        function sendMsg() {
            const inp = document.getElementById('inp');
            const box = document.getElementById('chat-box');
            if(inp.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<b>فيصل:</b> ${inp.value}`;
                box.appendChild(div);
                inp.value = "";
                box.scrollTop = box.scrollHeight; // عشان ينزل لآخر رسالة تلقائياً
            }
        }
        // إرسال بالضغط على Enter
        document.getElementById('inp').addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
    </script>

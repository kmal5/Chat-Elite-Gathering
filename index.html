<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية تجمع النخبة</title>
    <style>
        /* التنسيق العام للموقع */
        :root {
            --gold: #ffb300;
            --royal-blue: #1a237e;
            --bg-dark: #080808;
            --msg-bg: #121212;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية (الأعلام) */
        .sidebar {
            width: 75px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
            border-left: 1px solid #222;
        }

        .room-btn {
            width: 50px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .room-btn.active {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
        }

        .room-btn:hover { background: #222; }

        /* المنطقة الرئيسية */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر العلوي */
        .header {
            background: #111;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .header .title {
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header .stats {
            font-size: 13px;
            color: var(--gold);
            display: flex;
            gap: 10px;
        }

        /* منطقة الدردشة والرسائل */
        #chat-screen {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #050505;
        }

        .message-box {
            background: var(--msg-bg);
            padding: 12px;
            border-radius: 10px;
            border-right: 4px solid var(--gold);
            max-width: 90%;
            animation: fadeIn 0.4s ease;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .user-name { font-weight: bold; font-size: 14px; color: #fff; }

        .rank-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }

        .rank-dev { background: var(--royal-blue); }
        .rank-vip { background: #c0392b; }

        .msg-text { color: #ddd; font-size: 15px; line-height: 1.4; }

        /* صندوق الكتابة السفلي */
        .chat-footer {
            background: #111;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #222;
        }

        .input-box {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            outline: none;
            font-size: 15px;
        }

        .input-box:focus { border-color: var(--gold); }

        .send-btn {
            background: var(--gold);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:active { transform: scale(0.9); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="room-btn active">🇩🇿</div>
        <div class="room-btn">🇹🇳</div>
        <div class="room-btn">🇲🇦</div>
        <div style="color: #444; font-size: 30px; cursor: pointer;">+</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="title">👑 تجمع النخبة</div>
            <div class="stats">👤 124 | 💎 1,500</div>
        </div>

        <div id="chat-screen">
            <div class="message-box">
                <div class="msg-header">
                    <span class="user-name">Faisal</span>
                    <span class="rank-tag rank-dev">المطور</span>
                </div>
                <div class="msg-text">أهلاً بك يا بطل في شاتك الخاص.. جرب الآن واكتب رسالة بالأسفل!</div>
            </div>
        </div>

        <div class="chat-footer">
            <div style="color: var(--gold); font-size: 24px; cursor: pointer;">⊕</div>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
            <button class="send-btn" onclick="handleSend()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const chatScreen = document.getElementById('chat-screen');
        const messageInput = document.getElementById('messageInput');

        function handleSend() {
            const text = messageInput.value.trim();
            if (text !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'message-box';
                newMsg.innerHTML = `
                    <div class="msg-header">
                        <span class="user-name">فيصل</span>
                        <span class="rank-tag rank-vip">VIP</span>
                    </div>
                    <div class="msg-text">${text}</div>
                `;
                chatScreen.appendChild(newMsg);
                messageInput.value = "";
                // النزول لآخر رسالة تلقائياً
                chatScreen.scrollTop = chatScreen.scrollHeight;
            }
        }

        // إرسال عند ضغط زر Enter
        messageInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                handleSend();
            }
        });
    </script>

</body>
</html>
